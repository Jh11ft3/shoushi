<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势自定义控制系统 | HBS Developer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.14.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose@0.0.7/dist/handpose.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui;
        }
        body {
            min-height: 100vh;
            background: #050508;
            color: #ffffff;
            padding: 20px;
        }
        /* 液态玻璃卡片样式 */
        .glass-card {
            backdrop-filter: blur(18px);
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 24px;
        }
        #videoBox {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
        }
        video, canvas {
            width: 100%;
            display: block;
        }
        .config-item {
            margin: 16px 0;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            opacity: 0.85;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(110, 160, 255, 0.25);
            color: #d0e0ff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s ease;
        }
        button:hover {
            background: rgba(110, 160, 255, 0.4);
        }
        .log-area {
            height: 160px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
        }
        @media (max-width:820px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 摄像头实时预览区域 -->
    <div class="glass-card" id="videoBox">
        <h2 style="margin-bottom:15px">实时手势捕捉画面</h2>
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="drawCanvas"></canvas>
    </div>

    <!-- 手势自定义配置面板 -->
    <div class="glass-card">
        <h2>手势行为自定义编辑器</h2>
        <div class="config-item">
            <label>挥手动作自定义触发文字</label>
            <input id="waveText" value="检测到挥手，欢迎你">
        </div>
        <div class="config-item">
            <label>页面背景切换色值</label>
            <input type="color" id="bgColor" value="#121522">
        </div>
        <div class="config-item">
            <label>额外弹窗提示内容</label>
            <textarea id="alertMsg" rows="3">HBS手势系统已识别招手动作</textarea>
        </div>
        <button id="startBtn">启动摄像头手势识别</button>
        <button id="saveConfig">保存自定义配置</button>

        <div class="config-item" style="margin-top:20px">
            <label>实时识别日志</label>
            <textarea class="log-area" id="logBox" readonly></textarea>
        </div>
    </div>
</div>

<script>
// 全局配置存储
let customConfig = {
    waveText: "检测到挥手，欢迎你",
    bgColor: "#121522",
    alertText: "HBS手势系统已识别招手动作"
};
let handModel = null;
let lastWaveTime = 0;
const throttleTime = 2500; // 手势冷却时间，防止重复触发

// DOM元素挂载
const video = document.getElementById('webcam');
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');

// 保存用户自定义配置
document.getElementById('saveConfig').addEventListener('click', ()=>{
    customConfig.waveText = document.getElementById('waveText').value;
    customConfig.bgColor = document.getElementById('bgColor').value;
    customConfig.alertText = document.getElementById('alertMsg').value;
    document.body.style.background = customConfig.bgColor;
    addLog("✅ 所有手势配置保存完成");
})

// 日志打印函数
function addLog(content){
    const logDom = document.getElementById("logBox");
    logDom.value += `[${new Date().toLocaleTimeString()}] ${content}\n`;
    logDom.scrollTop = logDom.scrollHeight;
}

// 加载手部识别模型
async function loadHandModel(){
    addLog("正在加载手部AI识别模型，请稍候...");
    handModel = await handpose.load({complexity:0});
    addLog("✅ 手势模型加载完毕，可以识别手部动作");
}

// 开启摄像头设备
async function openCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({
        video: {facingMode:"user", width:640, height:480}
    });
    video.srcObject = stream;
    canvas.width = 640;
    canvas.height = 480;
    detectHandFrame();
}

// 持续循环检测每一帧手部姿态
async function detectHandFrame(){
    if(!handModel) return requestAnimationFrame(detectHandFrame);
    const predictions = await handModel.estimateHands(video);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(predictions.length > 0){
        const handData = predictions[0];
        drawHandPoints(handData.landmarks);
        judgeWaveGesture(handData.landmarks);
    }
    requestAnimationFrame(detectHandFrame);
}

// 绘制手部骨架点位
function drawHandPoints(points){
    ctx.fillStyle = "#70b8ff";
    points.forEach(point=>{
        ctx.beginPath();
        ctx.arc(point[0], point[1], 5, 0, Math.PI*2);
        ctx.fill();
    })
}

// 挥手、招手动作逻辑判定
function judgeWaveGesture(landmark){
    const nowTime = Date.now();
    if(nowTime - lastWaveTime < throttleTime) return;

    // 提取四根手指指尖、指根坐标
    const indexTip = landmark[8], middleTip = landmark[12];
    const ringTip = landmark[16], littleTip = landmark[20];
    const wrist = landmark[0];

    // 简易挥手判定：指尖高度明显高于手腕，判定为招手挥手
    const fingerAvgY = (indexTip[1]+middleTip[1]+ringTip[1]+littleTip[1])/4;
    if(fingerAvgY < wrist[1] - 35){
        lastWaveTime = nowTime;
        triggerGestureResponse();
    }
}

// 触发手势预设反馈效果
function triggerGestureResponse(){
    addLog(`👋 成功识别挥手手势`);
    // 弹窗提示
    alert(customConfig.alertText);
    // 页面临时文字提示
    const tipDom = document.createElement("div");
    tipDom.innerText = customConfig.waveText;
    tipDom.style.cssText = `
        position:fixed;top:30px;left:50%;transform:translateX(-50%);
        background:rgba(20,80,180,0.75);color:#fff;padding:12px 26px;
        border-radius:10px;font-size:18px;backdrop-filter:blur(10px);z-index:999;
    `;
    document.body.appendChild(tipDom);
    setTimeout(()=>tipDom.remove(),3000);
}

// 启动按钮绑定事件
startBtn.addEventListener('click',async ()=>{
    startBtn.disabled = true;
    await loadHandModel();
    await openCamera();
    addLog("摄像头已正常开启，手势监测正式运行");
})
</script>
</body>
</html>
